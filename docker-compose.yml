services:

  postgres:
    image: postgres:15
    container_name: graphrank_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: graphrank
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: graphrank_redis
    ports:
      - "6379:6379"

  api:
    build: .
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 3

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  spark:
    image: apache/spark:3.5.1
    container_name: graphrank_spark
    command: ["/opt/spark/bin/spark-class","org.apache.spark.deploy.master.Master"]
    ports:
      - "8080:8080"
      - "7077:7077"